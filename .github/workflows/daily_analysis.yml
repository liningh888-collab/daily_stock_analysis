name: 高胜率稳健量化策略
on:
  schedule:
    # 北京时间 周一~周五 9:15 → UTC 1:15
    - cron: '15 1 * * 1-5'
    # 北京时间 周一~周五 11:30 → UTC 3:30
    - cron: '30 3 * * 1-5'
    # 北京时间 周一~周五 14:45 → UTC 6:45
    - cron: '45 6 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy yfinance
      - name: 运行策略
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
          TZ: Asia/Shanghai
        run: python main.py
