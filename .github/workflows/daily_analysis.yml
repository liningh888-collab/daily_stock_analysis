name: 每日股票分析 (四时段推送)【防漏跑终极版】

on:
  schedule:
    # 正常时段（北京时间）
    - cron: '0 1 * * 1-5'      # 09:00
    - cron: '30 3 * * 1-5'     # 11:30
    - cron: '40 5 * * 1-5'     # 13:40
    - cron: '30 9 * * 1-5'     # 17:30
    - cron: '40 10 * * 1-5'    # 18:40

    # ✅ 防漏跑兜底触发（每小时检查一次）
    - cron: '0 * * * 1-5'

  workflow_dispatch: # 手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install pandas akshare requests numpy

      - name: 执行量化分析推送
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
        run: python main.py
