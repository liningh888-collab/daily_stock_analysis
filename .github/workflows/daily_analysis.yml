name: 每日股票分析 (早盘黄金推送版)

on:
  schedule:
    # ✅ 核心：北京时间周一到周五 8:30（UTC 00:30）
    # 优先级TOP1：盘前推送，给足交易员决策时间
    - cron: '30 0 * * 1-5'

  workflow_dispatch: # 保留手动触发，方便测试

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # ✅ 保留：缓存pip依赖，安装从40秒→2秒

      - name: 升级 pip + 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行量化分析推送
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
        run: python main.py
