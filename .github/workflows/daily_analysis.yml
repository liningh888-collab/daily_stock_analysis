name: 高胜率稳健量化策略
on:
  schedule:
    # 盘前：北京时间 08:30 运行
    - cron: '30 0 * * 1-5'
    # 盘中：北京时间 13:30 运行
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy yfinance

      - name: 执行量化策略
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
        run: python main.py
