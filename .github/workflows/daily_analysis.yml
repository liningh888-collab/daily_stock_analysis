name: 每日股票分析 (四时段推送)

on:
  schedule:
    - cron: '0 1 * * 1-5'      # UTC 1点 → 北京时间 09:00
    - cron: '30 3 * * 1-5'     # UTC 3点30 → 北京时间 11:30
    - cron: '40 5 * * 1-5'     # UTC 5点40 → 北京时间 13:40
    - cron: '30 9 * * 1-5'     # UTC 9点30 → 北京时间 17:30
    - cron: '40 10 * * 1-5'    # UTC 10点40 → 北京时间 18:40 ✅ 新增
  workflow_dispatch:           # 手动触发备用

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install pandas akshare requests numpy

      - name: 执行量化分析推送
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
        run: python main.py
