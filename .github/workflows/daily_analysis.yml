name: 高胜率稳健量化策略
on:
  schedule:
    - cron: '0 0 * * 1-5'    # 北京时间 08:00 准点推送
    - cron: '0 1 * * 1-5'    # 北京时间 09:00 准点推送
    - cron: '30 5 * * 1-5'  # 北京时间 13:30 盘中推送
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy yfinance
      - name: 运行策略
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
        run: python main.py
