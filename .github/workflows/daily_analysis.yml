name: 高胜率稳健量化策略
on:
  schedule:
    # 倒推1小时20分 → 北京时间 周一~周五 9:31 运行
    - cron: '31 1 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy yfinance
      - name: 运行策略
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
          TZ: Asia/Shanghai
        run: python main.py
