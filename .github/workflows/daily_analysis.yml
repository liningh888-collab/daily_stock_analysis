name: 高胜率稳健量化策略
on:
  schedule:
    # ✅ 优化：提前到 UTC 0:00（北京时间 8:00），预留足够缓冲
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    # ✅ 优化：超时时间从 3 分钟改成 30 分钟，避免任务被强制终止
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy yfinance
      - name: 运行策略
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
          # ✅ 新增：显式设置时区为北京时间
          TZ: Asia/Shanghai
        run: python main.py
