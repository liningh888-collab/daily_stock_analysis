name: 每日股票分析 (四时段推送)

on:
  schedule:
    - cron: '30 1 * * 1-5'     # 北京时间 09:30
    - cron: '30 3 * * 1-5'     # 北京时间 11:30
    - cron: '30 7 * * 1-5'     # 北京时间 15:30
    - cron: '30 9 * * 1-5'     # 北京时间 17:30
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装极简依赖
        run: pip install pandas akshare requests

      - name: 执行四时段推送
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          # 关键新增：添加 CONFIG_CONTENT 环境变量，关联 GitHub Secrets
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
        run: python main.py
