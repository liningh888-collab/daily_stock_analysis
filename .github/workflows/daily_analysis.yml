name: 每日股票分析 (四时段推送)

on:
  # 定时触发：每天 9:30、11:30、15:30、17:30 执行
  # 注意：GitHub 时间是 UTC 时间，需要换算北京时间
  # 北京时间 9:30 = UTC 1:30
  # 北京时间 11:30 = UTC 3:30
  # 北京时间 15:30 = UTC 7:30
  # 北京时间 17:30 = UTC 9:30
  schedule:
    - cron: '30 1 * * 1-5'     # 9:30 开盘
    - cron: '30 3 * * 1-5'     # 11:30 午盘
    - cron: '30 7 * * 1-5'     # 15:30 收盘
    - cron: '30 9 * * 1-5'     # 17:30 盘后总结
  
  # 手动触发（保留）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析
          - market-only   # 仅大盘
          - stocks-only   # 仅个股

# 并发控制
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 缩短超时，避免占用资源
    
    steps:
      - name: 随机延迟（避免服务器压力）
        run: sleep $((RANDOM % 10))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pandas tushare requests python-dotenv tenacity fake-useragent
      
      - name: 创建目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析（分时段逻辑）
        env:
          # ==================== 核心环境变量 ====================
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}

          # 无用配置清空（避免干扰）
          GEMINI_API_KEY: ""
          GEMINI_MODEL: ""
          GEMINI_MODEL_FALLBACK: ""
          GEMINI_REQUEST_DELAY: ""
          LITELLM_CONFIG: ""
          AIHUBMIX_KEY: ""
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          MARKET_REVIEW_REGION: "cn"
          REPORT_TYPE: "simple"
          SINGLE_STOCK_NOTIFY: "true"
          MARKET_REVIEW_ENABLED: "true"
          ANALYSIS_DELAY: "0"
          TRADING_DAY_CHECK_ENABLED: "true"
          LOG_LEVEL: INFO
          MAX_WORKERS: "1"
          ENABLE_CHIP_DISTRIBUTION: "false"
          REALTIME_SOURCE_PRIORITY: "tencent"
          
        run: |
          # 获取北京时间
          CURRENT_HOUR=$(TZ='Asia/Shanghai' date +%H)
          CURRENT_MIN=$(TZ='Asia/Shanghai' date +%M)
          
          echo "=========================================="
          echo "🚀 股票分析机器人 - 四时段推送"
          echo "=========================================="
          echo "⏰ 当前时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "📊 自选股: $STOCK_LIST"
          echo "=========================================="

          # 调用融合版main.py的--simple-push模式（纯文字推送）
          python main.py --simple-push --stocks $STOCK_LIST
      
      - name: 上传报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 3
      
      - name: 显示结果
        if: always()
        run: |
          echo "=========================================="
          echo "📤 推送完成"
          echo "=========================================="
