name: 每日股票分析 (四时段推送)

on:
  schedule:
    - cron: '30 1 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '30 7 * * 1-5'
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: {python-version: '3.11', cache: 'pip'}
      - name: 安装所有依赖
        run: |
          pip install --upgrade pip
          pip install pandas tushare requests python-dotenv tenacity fake-useragent sqlalchemy litellm
      - name: 执行分析
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
        run: python main.py --simple-push --stocks $STOCK_LIST
