name: 高胜率稳健量化策略
on:
  schedule:
    # 北京时间周一到周五 8:30（盘前黄金时间，给足决策时间）
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行量化策略
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
        run: python main.py
