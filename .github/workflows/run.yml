name: 股票量化自动推送
on:
  schedule:
    - cron: "0 1 * * *"    # 北京时间 9:00
    - cron: "30 3 * * *"   # 北京时间 11:30
    - cron: "0 7 * * *"    # 北京时间 15:00
    - cron: "30 9 * * *"   # 北京时间 17:30
  workflow_dispatch:       # 手动运行按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install requests akshare pandas numpy

      - name: 启动分析并推送
        env:
          CONFIG_CONTENT: ${{ secrets.CONFIG_CONTENT }}
        run: python main.py
